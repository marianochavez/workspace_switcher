name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build DMG & Create Release
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Run tests
        run: |
          xcodebuild test \
            -project WorkspaceSwitcher.xcodeproj \
            -scheme WorkspaceSwitcher \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-"

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Set build version
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.version.outputs.VERSION }}" \
            WorkspaceSwitcher/Info.plist 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Add :CFBundleShortVersionString string ${{ steps.version.outputs.VERSION }}" \
            WorkspaceSwitcher/Info.plist 2>/dev/null || true

      - name: Build DMG
        run: |
          chmod +x scripts/build-dmg.sh
          ./scripts/build-dmg.sh

      - name: Rename DMG with version
        run: mv build/WorkspaceSwitcher.dmg build/WorkspaceSwitcher-${{ steps.version.outputs.VERSION }}.dmg

      - name: Download Sparkle tools
        run: |
          curl -L -o Sparkle.tar.xz "https://github.com/sparkle-project/Sparkle/releases/download/2.6.4/Sparkle-2.6.4.tar.xz"
          mkdir -p sparkle-tools
          tar xf Sparkle.tar.xz -C sparkle-tools

      - name: Generate appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          mkdir -p appcast-staging
          cp build/WorkspaceSwitcher-${{ steps.version.outputs.VERSION }}.dmg appcast-staging/

          # Fetch existing appcast for merge
          git fetch origin gh-pages || true
          git show origin/gh-pages:appcast.xml > appcast-staging/appcast.xml 2>/dev/null || true

          DOWNLOAD_URL="https://github.com/marianochavez/workspace_switcher/releases/download/v${{ steps.version.outputs.VERSION }}"

          # Write key without trailing newline to avoid corrupting base64
          KEY_FILE=$(mktemp)
          printf '%s' "$SPARKLE_PRIVATE_KEY" > "$KEY_FILE"

          ./sparkle-tools/bin/generate_appcast \
            --ed-key-file "$KEY_FILE" \
            --download-url-prefix "$DOWNLOAD_URL/" \
            appcast-staging/

          rm -f "$KEY_FILE"

      - name: Update GitHub Pages appcast
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          TMPDIR=$(mktemp -d)
          git worktree add "$TMPDIR" origin/gh-pages

          cp appcast-staging/appcast.xml "$TMPDIR/appcast.xml"

          cd "$TMPDIR"
          git add appcast.xml
          git commit -m "Update appcast for v${{ steps.version.outputs.VERSION }}" || echo "No changes"
          git push origin HEAD:gh-pages

          cd -
          git worktree remove "$TMPDIR"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: WorkspaceSwitcher v${{ steps.version.outputs.VERSION }}
          draft: false
          generate_release_notes: true
          files: build/WorkspaceSwitcher-*.dmg
